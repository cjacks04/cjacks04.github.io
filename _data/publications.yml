- title: "Networks of Influential Participants: Information Diffusion in Citizen Science"
  year: 2014
  authors: "Corey Jackson, Carsten Østerlund, Gabriel Mugar, Kevin Crowston, and Katie DeVries Hassman"
  venue: "ACM Conference on Online Social Networks (COSN'14)"
  type: "Poster"
  topics:
    - network analysis
    - citizen science
    - diffusion
  note: "This poster examines information diffusion in citizen science through the lens of influential participants and network structure. It explores how ideas, communication, and participation may spread unevenly through a collaborative community. The work highlights the usefulness of network analysis for understanding online scientific collaboration. It contributes to early research on participation dynamics in citizen science."
  links: []

- title: "Encouraging Work in Citizen Science: Experiments in Goal Setting and Anchoring"
  year: 2016
  authors: "Corey Jackson, Gabriel Mugar, Kevin Crowston, and Carsten Østerlund"
  venue: "Proceedings of the 19th ACM Conference on Computer Supported Cooperative Work and Social Computing Companion"
  type: "Poster"
  topics:
    - citizen science
    - experiment
    - motivation
  note: "This paper examines how goal setting and anchoring can be used to encourage participation in citizen science. It reports on experimental efforts to shape contributor behavior through interface and framing interventions. The work contributes to research on motivational design in crowdsourcing and collaborative systems. It also highlights how relatively small design choices can influence participation patterns."
  links:
    - "https://dl.acm.org/doi/10.1145/2818052.2869129"

- title: "Learning at the Seafloor, Looking at the Sky: The Relationship Between Individual Tasks and Collaborative Engagement in Two Citizen Science Projects"
  year: 2013
  authors: "Katie DeVries Hassman, Gabriel Mugar, Carsten Østerlund, and Corey Jackson"
  venue: "International Society of the Learning Sciences CSCL 2013 Conference Proceedings"
  type: "Short Paper"
  topics:
    - citizen science
    - collaboration
    - learning
  note: "This paper examines the relationship between individual task work and broader collaborative engagement in two citizen science projects. It asks how micro-level participation connects to the social dynamics of community involvement. The study helps explain how contributors move between task completion and deeper collaborative awareness. It contributes to research on learning and participation in online scientific collaboration."
  links:
    - "https://doi.dx.org/10.22318/cscl2013.2.265"

- title: "Face-to-face matters: Inspirations from the Human Library"
  year: 2015
  authors: "Corey Jackson, Yun Huang, and Abby S. Kasowitz-Scheer"
  venue: "International Journal of Mobile Human Computer Interaction (IJMHCI)"
  type: "Journal"
  topics:
    - human library
    - communication
    - HCI
  note: "This paper draws inspiration from the Human Library to examine the importance of face-to-face interaction. It considers how embodied encounters can support dialogue, empathy, and social understanding in ways that differ from mediated interaction. The paper contributes to HCI by reflecting on how presence shapes communication and connection. It also broadens the scope of the publication list beyond citizen science and crowdsourcing."
  links:
    - "http://dx.doi.org/10.4018/ijmhci.2015070103"

- title: "Digital Experimentation: Motivating Contribution to Citizen Science"
  year: 2014
  authors: "Corey Jackson, Kevin Crowston, Carsten Østerlund, Gabriel Mugar, and Katie DeVries Hassman"
  venue: "Conference on Digital Experimentation (CODE@MIT)"
  type: "Poster"
  topics:
    - citizen science
    - experiment
    - motivation
  note: "This poster examines how digital experimentation can be used to motivate contribution in citizen science. It focuses on intervention-oriented approaches to understanding participation and testing ways of improving engagement. The work contributes to early experimental research on how design choices influence collaborative scientific participation. It also reflects a broader interest in motivation and behavioral design."
  links: []

- title: "Participation Through Perspective: How Perceptions Shape Participation in Virtual Citizen Science"
  year: 2016
  authors: "Corey Jackson, Ruike Lin, Liz Dowthwaite, Cliff Johnson, and Laura Trouille"
  venue: "SSRN"
  type: "Preprint"
  topics:
    - citizen science
    - survey
    - participation
  note: "This paper examines how participants’ perceptions shape engagement in virtual citizen science. It asks how people interpret the project, its goals, and their own role within it, and how those perceptions influence participation. The study highlights the importance of perspective and framing in sustaining collaborative online work. It contributes to research on participation by emphasizing the interpretive side of engagement."
  links:
    - "http://dx.doi.org/10.2139/ssrn.6312611"
